version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: ct_photos_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ct_photos_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
  
  minio:
    image: minio/minio:latest
    container_name: ct_photos_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend
  

  backend:
    build: ./backend
    container_name:  ct_photos_backend
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ct_photos_database}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-ct_photos_database}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - backend

volumes:
  postgres_data:
  minio_data:
  
networks:
  backend:
    driver: bridge
  
