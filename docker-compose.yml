version: '3.8'

x-hf-env: &hf-env
  HF_HOME: /opt/huggingface
  HF_HUB_CACHE: /opt/huggingface/hub
  TRANSFORMERS_CACHE: /opt/huggingface/hub
  SENTENCE_TRANSFORMERS_HOME: /opt/huggingface/sentence-transformers

  EMBEDDING_MODEL_NAME: /opt/models/embedding
  CROSS_ENCODER_MODEL_NAME: /opt/models/cross_encoder

  USE_CROSS_ENCODER: ${USE_CROSS_ENCODER:-true}
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  HF_DATASETS_OFFLINE: "1"
  
x-backend-build: &backend-build
  context: ./backend
  args:
    HF_TOKEN: ${HF_TOKEN:-}
    EMBEDDING_MODEL_REPO: ${EMBEDDING_MODEL_REPO:-DmitryPogrebnoy/MedRuBertTiny2}
    CROSS_ENCODER_MODEL_REPO: ${CROSS_ENCODER_MODEL_REPO:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
  
services:
  database:
    image: postgres:15-alpine
    container_name: ct_photos_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ct_photos_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
  
  minio:
    image: minio/minio:latest
    container_name: ct_photos_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    networks:
      - backend
    
  redis:
    image: redis:7-alpine
    container_name: ct_photos_redis
    ports:
      - "6380:6379"
    networks:
      - backend
  
  backend:
    image: pirogovasproject-backend:local
    build: *backend-build
    container_name: ct_photos_backend
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      <<: *hf-env
      POSTGRES_DB: ${POSTGRES_DB:-ct_photos_database}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-ct_photos_database}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./clinical_protocols:/app/clinical_protocols
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - backend
  
  celery_worker:
    build: *backend-build
    container_name: ct_photos_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      <<: *hf-env
      POSTGRES_DB: ${POSTGRES_DB:-ct_photos_database}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@database:5432/${POSTGRES_DB:-ct_photos_database}
    volumes:
      - ./backend:/app
      - ./clinical_protocols:/app/clinical_protocols
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - backend

volumes:
  postgres_data:
  minio_data:
  
networks:
  backend:
    driver: bridge
    

